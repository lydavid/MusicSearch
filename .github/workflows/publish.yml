name: Publish

on:
  workflow_call:
    inputs:
      track:
        required: true
        type: string
      skip-desktop:
        required: true
        type: boolean
        default: false

jobs:
  checks:
    permissions:
      contents: write
    uses: ./.github/workflows/checks.yml
    secrets: inherit

  test-e2e:
    permissions:
      contents: write
    uses: ./.github/workflows/test-e2e.yml
    secrets: inherit

  publish:
    needs:
      - checks
      - test-e2e
    timeout-minutes: 120
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # This is required for requesting the JWT
    outputs:
      has_new_version_name: ${{ steps.update-ios-version.outputs.has_new_version_name }}
    steps:
      - name: Checkout
        uses: nschloe/action-cached-lfs-checkout@385a8ecc719e50b8c71af6ab01a624b486b7c3bc # v1
        with:
          token: ${{ secrets.PAT }}

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Setup gradle
        uses: ./.github/actions/setup

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Setup semantic-release
        run: npm install

      - name: Get next release version
        id: get-next-version
        run: |
          git pull
          npx semantic-release --dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}

      # -b preserves our line separator preference
      - name: Bump version code
        run: |
          version_code=$(grep 'VERSION_CODE' gradle.properties | cut -d = -f 2)
          sed -bi "s/VERSION_CODE=$version_code/VERSION_CODE=$(($version_code + 1))/" gradle.properties
        shell: bash

      - name: Bump version name
        if: steps.get-next-version.outputs.new-release-published == 'true'
        run: |
          version_name=$(grep 'VERSION_NAME' gradle.properties | cut -d = -f 2)
          new_version_name=${{ steps.get-next-version.outputs.new-release-version }}
          sed -bi "s/VERSION_NAME=$version_name/VERSION_NAME=$new_version_name/" gradle.properties
        shell: bash

      - name: Read version from gradle.properties
        run: |
          VERSION_NAME=$(grep -E "^VERSION_NAME=" gradle.properties | cut -d'=' -f2)
          VERSION_CODE=$(grep -E "^VERSION_CODE=" gradle.properties | cut -d'=' -f2)
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "Version name: $VERSION_NAME, version code: $VERSION_CODE"

      - name: Save release notes
        if: steps.get-next-version.outputs.new-release-published == 'true'
        run: |
          release_notes=$(echo "${{ steps.get-next-version.outputs.new-release-notes }}" | \
            tail -n +3 | \
            sed 's/ ([[][^]]*]([^)]*))//g')
          echo "$release_notes" > "fastlane/metadata/android/en-US/changelogs/${{ env.VERSION_CODE }}.txt"
          echo "$release_notes" > fastlane/metadata/ios/en-US/release_notes.txt

      # After this step, the workspace contains credentials file.
      # Take care not to commit it or upload artifacts with it.
      - name: Write to keystore.properties
        run: |
          echo "storePassword=${{ secrets.RELEASE_STORE_PASSWORD }}" >> keystore.properties
          echo "keyPassword=${{ secrets.RELEASE_KEY_PASSWORD }}" >> keystore.properties
        shell: bash

      # Necessary because the debug and release version of the app has a different redirect
      - name: Replace debug MusicBrainz client id/secret with release versions
        run: |
          echo "TVVTSUNCUkFJTlpfQ0xJRU5UX0lEPWtpbVpiWXlaYUVia2Ewb0Npb1ExNUdINWhlNFp4dGtXCg==" | base64 -d > not_so_secret.properties
          echo "TVVTSUNCUkFJTlpfQ0xJRU5UX1NFQ1JFVD00ZVlINmpqRzBVVm1GRGN1Yk1CSThrVVlxT18xVkxHRAo=" | base64 -d >> not_so_secret.properties

      - name: Replace application id
        run: sed -i -e 's/\.debug//' shared/domain/src/commonMain/kotlin/ly/david/musicsearch/shared/domain/Constants.kt

      - name: Decrypt release keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_JKS_BASE64 }}" | base64 -d > release-keystore.jks

      - name: Assemble F-Droid APK
        id: build-fdroid
        run: |
          sed -i -e '/firebase/d' -e '/google.services/d' build.gradle.kts
          ./gradlew clean assembleFDroidRelease

      - name: Decrypt Google Services file
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > android/app/google-services.json

      - name: Assemble Google Play APK, bundle AAB
        id: build-google
        run: |
          git restore build.gradle.kts
          ./gradlew android:app:exportLibraryDefinitions -PaboutLibraries.exportVariant=googlePlayRelease
          ./gradlew assembleGooglePlayRelease bundleGooglePlayRelease
        env:
          ORG_GRADLE_PROJECT_SPOTIFY_CLIENT_ID: ${{ secrets.ORG_GRADLE_PROJECT_SPOTIFY_CLIENT_ID }}
          ORG_GRADLE_PROJECT_SPOTIFY_CLIENT_SECRET: ${{ secrets.ORG_GRADLE_PROJECT_SPOTIFY_CLIENT_SECRET }}

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      # This step may fail if we rerun because we have already uploaded this version
      # so subsequent steps should always run
      - name: Publish build to Google Play
        id: publish_play_store
        run: |
          fastlane android publish \
            track:${{ inputs.track }} \
            json_key_path:${{ steps.auth.outputs.credentials_file_path }}

      - name: Setup desktop
        if: ${{ !cancelled() && steps.get-next-version.outputs.new-release-published == 'true' && !inputs.skip-desktop }}
        run: |
          ./gradlew desktop:app:exportLibraryDefinitions
          ./gradlew jar
        env:
          ORG_GRADLE_PROJECT_SPOTIFY_CLIENT_ID: ${{ secrets.ORG_GRADLE_PROJECT_SPOTIFY_CLIENT_ID }}
          ORG_GRADLE_PROJECT_SPOTIFY_CLIENT_SECRET: ${{ secrets.ORG_GRADLE_PROJECT_SPOTIFY_CLIENT_SECRET }}

      - name: Create desktop distributions
        if: ${{ !cancelled() && steps.get-next-version.outputs.new-release-published == 'true' && !inputs.skip-desktop }}
        uses: hydraulic-software/conveyor/actions/build@9e90ce7c2a4356c99d68c63f41e4bc497da279c8 # v22.0
        with:
          signing_key: ${{ secrets.SIGNING_KEY }}
          agree_to_license: 1
          command: make site
          extra_flags: --parallelism=2

      - run: |
          du -ah output | sort -rh
          mv output/download.html .
          mv output/icon.svg .
          git add download.html icon.svg
        if: ${{ !cancelled() && steps.get-next-version.outputs.new-release-published == 'true' && !inputs.skip-desktop }}

      - name: Update iOS version
        id: update-ios-version
        if: ${{ !cancelled() && steps.get-next-version.outputs.new-release-published == 'true' }}
        run: |
          sed -i 's/MARKETING_VERSION = [^;]*;/MARKETING_VERSION = ${{ env.VERSION_NAME }};/g' ios-app/musicsearch.xcodeproj/project.pbxproj
          sed -i 's/CURRENT_PROJECT_VERSION = [^;]*;/CURRENT_PROJECT_VERSION = ${{ env.VERSION_CODE }};/g' ios-app/musicsearch.xcodeproj/project.pbxproj
          echo "has_new_version_name=true" >> $GITHUB_OUTPUT

      - name: Commit version code bump
        if: ${{ !cancelled() }}
        run: |
          git pull --rebase --autostash
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add gradle.properties ios-app/musicsearch.xcodeproj/project.pbxproj
          git add fastlane/metadata/android/en-US/changelogs/
          git commit -m "chore: bump version to ${{ env.VERSION_NAME }} (${{ env.VERSION_CODE }}) [skip ci]"
          git push

      # See .releaserc for the artifacts we include in each release
      - name: Publish to GitHub
        if: ${{ !cancelled() && steps.get-next-version.outputs.new-release-published == 'true' }}
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}

  publish-ios:
    needs: publish # depends on it modifying and committing some files
    if: ${{ !cancelled() && needs.publish.outputs.has_new_version_name == 'true' }}
    permissions:
      contents: read
    uses: ./.github/workflows/publish-ios.yml
    secrets: inherit

  publish-gh-pages:
    needs: publish
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/jekyll-gh-pages.yml
